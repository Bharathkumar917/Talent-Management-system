version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tms-postgres
    environment:
      POSTGRES_USER: tms_user
      POSTGRES_PASSWORD: tms_password_dev
      POSTGRES_DB: team_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms_user -d team_management"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
